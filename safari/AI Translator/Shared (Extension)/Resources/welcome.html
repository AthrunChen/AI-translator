<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>欢迎使用 AI 网页翻译器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      max-width: 800px;
      background: white;
      border-radius: 20px;
      padding: 60px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    
    .logo {
      font-size: 80px;
      text-align: center;
      margin-bottom: 20px;
    }
    
    h1 {
      text-align: center;
      color: #2d3748;
      font-size: 36px;
      margin-bottom: 20px;
    }
    
    .subtitle {
      text-align: center;
      color: #718096;
      font-size: 18px;
      margin-bottom: 40px;
    }
    
    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    
    .feature {
      background: #f7fafc;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
    }
    
    .feature-icon {
      font-size: 40px;
      margin-bottom: 10px;
    }
    
    .feature-title {
      font-size: 16px;
      font-weight: 600;
      color: #2d3748;
      margin-bottom: 8px;
    }
    
    .feature-desc {
      font-size: 14px;
      color: #718096;
    }
    
    .setup {
      background: #ebf8ff;
      border-radius: 12px;
      padding: 30px;
      margin-bottom: 30px;
    }
    
    .setup h2 {
      color: #2b6cb0;
      font-size: 20px;
      margin-bottom: 20px;
    }
    
    .setup ol {
      padding-left: 20px;
      color: #2c5282;
    }
    
    .setup li {
      margin-bottom: 12px;
      line-height: 1.6;
    }
    
    .setup code {
      background: #bee3f8;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: "Consolas", monospace;
    }
    
    .cta {
      text-align: center;
    }
    
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
      color: white;
      padding: 16px 40px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 18px;
      font-weight: 600;
      box-shadow: 0 4px 12px rgba(72, 187, 120, 0.4);
      transition: transform 0.2s;
    }
    
    .btn:hover {
      transform: translateY(-2px);
    }
    
    .footer {
      text-align: center;
      margin-top: 30px;
      color: #a0aec0;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🌐</div>
    <h1>欢迎使用 AI 网页翻译器</h1>
    <p class="subtitle">智能、快速、保留上下文的网页翻译体验</p>
    
    <div class="features">
      <div class="feature">
        <div class="feature-icon">🤖</div>
        <div class="feature-title">AI 驱动</div>
        <div class="feature-desc">基于 Kimi AI 的高质量翻译</div>
      </div>
      <div class="feature">
        <div class="feature-icon">📄</div>
        <div class="feature-title">原文保留</div>
        <div class="feature-desc">保留英文原文，中文显示在下方</div>
      </div>
      <div class="feature">
        <div class="feature-icon">🎯</div>
        <div class="feature-title">专业术语</div>
        <div class="feature-desc">智能识别并保留专业词汇</div>
      </div>
      <div class="feature">
        <div class="feature-icon">⚙️</div>
        <div class="feature-title">可定制</div>
        <div class="feature-desc">支持自定义提示词和设置</div>
      </div>
    </div>
    
    <div class="setup">
      <h2>🚀 快速开始</h2>
      <ol>
        <li>点击浏览器工具栏中的扩展图标</li>
        <li>在设置中配置你的 <code>KIMI API Key</code></li>
        <li>访问任意英文网页，点击"翻译当前页面"</li>
        <li>等待翻译完成，享受双语阅读体验</li>
      </ol>
    </div>
    
    <div class="cta">
      <a href="#" class="btn" id="start-btn">开始使用</a>
    </div>
    
    <div class="footer">
      Powered by Kimi AI
    </div>
  </div>
  
  <script>
    document.getElementById('start-btn').addEventListener('click', () => {
      window.close();
    });
  </script>
</body>
</html>
