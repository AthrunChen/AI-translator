<!DOCTYPE html>
<html>
<head>
<style>
body { margin: 0; display: flex; gap: 20px; padding: 20px; }
.icon-container { text-align: center; }
canvas { border: 1px solid #ddd; }
</style>
</head>
<body>
<div class="icon-container"><h3>16x16</h3><canvas id="c16" width="16" height="16"></canvas></div>
<div class="icon-container"><h3>48x48</h3><canvas id="c48" width="48" height="48"></canvas></div>
<div class="icon-container"><h3>128x128</h3><canvas id="c128" width="128" height="128"></canvas></div>
<script>
function drawIcon(size, canvasId) {
  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext('2d');
  
  // 背景渐变
  const grad = ctx.createLinearGradient(0, 0, size, size);
  grad.addColorStop(0, '#4299e1');
  grad.addColorStop(1, '#3182ce');
  
  // 圆角矩形
  const r = size * 0.15;
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.fill();
  
  // 文字
  ctx.fillStyle = 'white';
  ctx.font = `bold ${size * 0.55}px Arial`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('文', size * 0.45, size * 0.55);
  
  // 小绿点
  const dotR = size * 0.12;
  ctx.fillStyle = '#48bb78';
  ctx.beginPath();
  ctx.arc(size * 0.78, size * 0.22, dotR, 0, Math.PI * 2);
  ctx.fill();
  
  // A
  ctx.fillStyle = 'white';
  ctx.font = `bold ${size * 0.14}px Arial`;
  ctx.fillText('A', size * 0.78, size * 0.26);
  
  return canvas.toDataURL('image/png');
}

// 绘制三个尺寸
drawIcon(16, 'c16');
drawIcon(48, 'c48');
drawIcon(128, 'c128');

// 导出链接
function download(canvasId, filename) {
  const canvas = document.getElementById(canvasId);
  const link = document.createElement('a');
  link.download = filename;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

setTimeout(() => {
  download('c16', 'icon16.png');
  download('c48', 'icon48.png');
  download('c128', 'icon128.png');
}, 100);
</script>
</body>
</html>
