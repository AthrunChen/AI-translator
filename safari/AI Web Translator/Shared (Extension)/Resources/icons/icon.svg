<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <!-- 主渐变：蓝紫色系 -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="50%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#A855F7"/>
    </linearGradient>
    
    <!-- 内部高光 -->
    <linearGradient id="highlightGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:white;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:white;stop-opacity:0"/>
    </linearGradient>
    
    <!-- 柔和阴影 -->
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="1" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景：大圆角 -->
  <rect width="128" height="128" rx="28" ry="28" fill="url(#mainGrad)"/>
  
  <!-- 顶部高光 -->
  <rect x="2" y="2" width="124" height="60" rx="26" ry="26" fill="url(#highlightGrad)"/>
  
  <!-- 翻译图标：双箭头循环符号（纯图形） -->
  <g transform="translate(64, 64)" filter="url(#softShadow)">
    <!-- 左上箭头（指向右下） -->
    <path d="M -28,-12 L -8,8 L -16,8 L -16,16 L 0,16 L 0,0 L -8,0 L 8,-20" 
          fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
    
    <!-- 右下箭头（指向左上） -->
    <path d="M 28,12 L 8,-8 L 16,-8 L 16,-16 L 0,-16 L 0,0 L 8,0 L -8,20" 
          fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
    
    <!-- 中心连接点 -->
    <circle cx="0" cy="0" r="6" fill="white" opacity="0.9"/>
  </g>
  
  <!-- AI 指示器 -->
  <circle cx="100" cy="28" r="10" fill="#34D399"/>
  <path d="M 96,28 L 99,31 L 104,25" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>